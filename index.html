<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yuya Visuals</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#E8E7D9;
font-family:Inter,sans-serif;
color:#2A2418;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

main{

display:flex;
flex-direction:column;
align-items:center;
text-align:center;

}

h1{

font-family:"Cormorant Garamond", serif;
font-size:7rem;
font-weight:500;
line-height:.9;

}

h2{

font-family:"Cormorant Garamond", serif;
font-size:7rem;
font-weight:500;
line-height:.9;

margin-bottom:45px;

}

p{

font-size:.85rem;
letter-spacing:4px;
text-transform:uppercase;
color:#6A6558;

margin-bottom:45px;

}

@media(max-width:768px){

h1,
h2{

font-size:4rem;

}

}

a{

text-decoration:none;

color:#2A2418;

border:1px solid #2A2418;

padding:18px 55px;

letter-spacing:4px;

font-size:12px;

text-transform:uppercase;

transition:.35s;

}

a:hover{

background:#2A2418;

color:#E8E7D9;

}

@media(max-width:700px){

.logo{

width:260px;

}

a{

padding:16px 40px;

}

}

</style>

</head>

<body>

<main>

<h1>Nuria</h1>
<h2>Clemente</h2>

<p>
3D VISUALIZATION · INTERIOR DESIGN
</p>

<a href="PORTFOLIO_NuriaClemente.pdf" target="_blank">
Ver Portafolio
</a>

</main>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yuya Visuals</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#E8E7D9;
color:#2A2418;

font-family:Inter,sans-serif;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

width:100%;
height:100%;

background-image:
radial-gradient(rgba(0,0,0,.025) 1px, transparent 1px);

background-size:6px 6px;

opacity:.35;

pointer-events:none;

}

/* NAV */

nav{

position:fixed;

top:0;

left:0;

width:100%;

padding:35px 7%;

display:flex;

justify-content:space-between;

align-items:center;

z-index:100;

backdrop-filter:blur(10px);

}

nav img{

width:58px;

}

nav a{

text-decoration:none;

color:#2A2418;

letter-spacing:3px;

font-size:12px;

margin-left:45px;

text-transform:uppercase;

transition:.35s;

}

nav a:hover{

opacity:.5;

}

/* HERO */

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

padding:40px;

animation:fade 1.4s ease;

}

.logo{

width:460px;

max-width:75vw;

margin-bottom:40px;

animation:float 5s ease-in-out infinite;

}

.small{

letter-spacing:7px;

text-transform:uppercase;

font-size:11px;

margin-bottom:25px;

opacity:.7;

}

.hero h2{

font-family:"Cormorant Garamond",serif;

font-size:32px;

font-weight:500;

margin-bottom:20px;

}

.hero p{

max-width:600px;

line-height:1.9;

color:#5f5847;

font-size:15px;

margin-bottom:55px;

}

.button{

display:inline-block;

padding:18px 60px;

border:1px solid #2A2418;

text-decoration:none;

color:#2A2418;

letter-spacing:4px;

text-transform:uppercase;

font-size:12px;

transition:.4s;

}

.button:hover{

background:#2A2418;

color:#E8E7D9;

transform:translateY(-3px);

box-shadow:0 15px 30px rgba(0,0,0,.08);

}

/* FOOTER */

footer{

padding:60px;

text-align:center;

font-size:12px;

letter-spacing:3px;

color:#777061;

}

/* ANIMATIONS */

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@keyframes float{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

100%{

transform:translateY(0);

}

}

@media(max-width:768px){

.logo{

width:280px;

}

nav{

padding:25px;

}

nav a{

margin-left:18px;

font-size:10px;

}

.hero h2{

font-size:26px;

}

}

</style>

</head>

<body>

<nav>

<img src="Logotipo.png">

<div>

<a href="PORTFOLIO_NuriaClemente.pdf" target="_blank">Portfolio</a>

<a href="mailto:tuemail@gmail.com">Contact</a>

</div>

</nav>

<section class="hero">

<img class="logo" src="logo.png">

<div class="small">

3D VISUALIZER · INTERIOR DESIGN

</div>

<h2>

Crafting calm, timeless visual experiences.

</h2>

<p>

Architecture visualization focused on atmosphere,
materials and storytelling.

</p>

<a class="button" href="portfolio.pdf" target="_blank">

VIEW PORTFOLIO

</a>

</section>

<footer>

© 2026 YUYA VISUALS

</footer>

</body>

</html>
